<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <link rel="stylesheet" href="assets/css/bootstrap.css" />
        <link rel="stylesheet" href="assets/css/styles.css" />

        <!--Bootstrap icons-->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    </head>
    <body>
        <div class="container">
            <div class="wrap">
                <center>
                    <img src="assets/imagem/logo.png" alt="logo" title="Logo" />
                </center>

                <form>
                    <div class="mb-3 input-box">
                        <label for="email" class="form-label">Email</label>

                        <input type="email" class="form-control" id="email" aria-describedby="emailHelp" placeholder="seu email" />
                        <i class="bi bi-person-circle icon-form"></i>
                    </div>
                    <div class="mb-3 input-box">
                        <label for="senha" class="form-label">Senha</label>
                        <input type="password" class="form-control" id="senha" placeholder="sua senha" />
                        <i class="bi bi-eye-slash icon-form"></i>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%">Logar</button>
                </form>
            </div>
        </div>
        <!--Inport Scripts -->
        <script src="assets/js/jquery-4.0.0.js"></script>
        <script src="assets/js/popper.min.js"></script>
        <script src="assets/js/bootstrap.min.js"></script>
    </body>
</html>
